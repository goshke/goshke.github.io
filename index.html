<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая вкладка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .quick-link {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .quick-link:hover {
            transform: translateY(-6px) scale(1.08);
            filter: brightness(1.15);
        }
        
        .icon-container {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .quick-link:hover .icon-container {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2),
                        0 8px 10px -6px rgb(0 0 0 / 0.2);
        }
        
        #clock {
            animation: clockTick 1s ease-in-out;
        }
        
        @keyframes clockTick {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 1.2s ease forwards;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center overflow-hidden relative">
    <!-- Лёгкий градиентный фон -->
    <div class="absolute inset-0 bg-gradient-to-br from-violet-500/5 via-transparent to-cyan-500/5 pointer-events-none"></div>
    
    <div class="max-w-6xl w-full mx-auto p-8">
        
        <!-- Часы и приветствие -->
        <div class="text-center mb-12 fade-in">
            <div id="clock" class="text-8xl font-light tracking-[-4px] mb-2"></div>
            <div id="date" class="text-2xl text-zinc-400 mb-3"></div>
            <div id="greeting" class="text-5xl font-semibold tracking-tight"></div>
        </div>

        <!-- Быстрые вкладки / иконки -->
        <div class="mb-16">
            <div class="grid grid-cols-5 gap-8 max-w-5xl mx-auto">
                
                <!-- Spotify -->
                <a href="https://open.spotify.com/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-brands fa-spotify text-5xl text-emerald-400"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">Spotify</span>
                </a>
                
                <!-- VK -->
                <a href="https://vk.com/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-brands fa-vk text-5xl text-blue-400"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">ВК</span>
                </a>
                
                <!-- YouTube -->
                <a href="https://youtube.com/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-brands fa-youtube text-5xl text-red-500"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">YouTube</span>
                </a>
                
                <!-- Claude -->
                <a href="https://claude.ai/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-solid fa-robot text-5xl text-purple-400"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">Claude</span>
                </a>
                
                <!-- Grok -->
                <a href="https://grok.x.ai/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-brands fa-x-twitter text-5xl text-white"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">Grok</span>
                </a>
                
                <!-- Gemini -->
                <a href="https://gemini.google.com/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-solid fa-gem text-5xl text-blue-400"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">Gemini</span>
                </a>
                
                <!-- Twitch -->
                <a href="https://www.twitch.tv/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-brands fa-twitch text-5xl text-purple-500"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">Twitch</span>
                </a>
                
                <!-- Telegram -->
                <a href="https://web.telegram.org/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-brands fa-telegram text-5xl text-cyan-400"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">Telegram</span>
                </a>
                
                <!-- Google Диск -->
                <a href="https://drive.google.com/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-brands fa-google-drive text-5xl text-blue-500"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">Диск</span>
                </a>
                
                <!-- Gmail -->
                <a href="https://mail.google.com/" target="_blank" class="quick-link flex flex-col items-center group">
                    <div class="icon-container w-20 h-20 glass rounded-3xl flex items-center justify-center mb-4">
                        <i class="fa-solid fa-envelope text-5xl text-red-400"></i>
                    </div>
                    <span class="text-sm font-medium text-zinc-300 group-hover:text-white">Gmail</span>
                </a>
            </div>
        </div>

        <!-- Погода + Календарь -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Погода -->
            <div class="glass rounded-3xl p-8 fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-medium flex items-center gap-3">
                        <i class="fa-solid fa-cloud-sun text-amber-400"></i>
                        Погода
                    </h2>
                    <input id="city" type="text" value="Москва" 
                           class="bg-transparent text-right focus:outline-none text-xl w-40 text-zinc-300 border-b border-transparent focus:border-zinc-400 transition-all">
                </div>
                <div id="weather" class="flex items-center justify-between">
                    <!-- JS заполнит -->
                </div>
            </div>

            <!-- Календарь -->
            <div class="glass rounded-3xl p-8 fade-in">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="prevMonth()" class="text-4xl hover:text-violet-400 transition-colors">‹</button>
                    <div id="monthTitle" class="text-2xl font-semibold"></div>
                    <button onclick="nextMonth()" class="text-4xl hover:text-violet-400 transition-colors">›</button>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-2 text-center text-base"></div>
            </div>
        </div>
    </div>

    <script>
        // Часы + дата + приветствие
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerHTML = `${hours}<span class="text-violet-400">:</span>${minutes}<span class="text-violet-400">:</span>${seconds}`;
            
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', options).replace(',', '');
            
            const hour = now.getHours();
            let greeting = '';
            if (hour < 6) greeting = 'Доброй ночи';
            else if (hour < 12) greeting = 'Доброе утро';
            else if (hour < 18) greeting = 'Добрый день';
            else greeting = 'Добрый вечер';
            document.getElementById('greeting').textContent = greeting + '!';
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Погода (Open-Meteo)
        async function getWeather(city = 'Москва') {
            const weatherDiv = document.getElementById('weather');
            weatherDiv.innerHTML = `<div class="text-zinc-400 text-xl">Загрузка...</div>`;
            
            try {
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ru`);
                const geoData = await geoRes.json();
                if (!geoData.results) throw new Error();
                
                const { latitude, longitude } = geoData.results[0];
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&timezone=auto`);
                const data = await res.json();
                
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                
                let icon = '☀️';
                if ([3,45,48,51,53,55,61,63,65,71,73,75,77,80,81,82,95,96,99].includes(code)) icon = '☁️';
                if ([61,63,65,80,81,82].includes(code)) icon = '🌧️';
                if ([71,73,75,77].includes(code)) icon = '❄️';
                
                weatherDiv.innerHTML = `
                    <div class="text-8xl">${icon}</div>
                    <div class="text-right">
                        <div class="text-7xl font-light leading-none">${temp}°</div>
                        <div class="text-zinc-400 text-2xl mt-1">${city}</div>
                    </div>
                `;
            } catch(e) {
                weatherDiv.innerHTML = `<div class="text-red-400 text-xl">Не удалось загрузить погоду</div>`;
            }
        }

        // Календарь
        let currentDate = new Date();
        function renderCalendar() {
            const monthTitle = document.getElementById('monthTitle');
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
            monthTitle.textContent = `${monthNames[month]} ${year}`;
            
            const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
            days.forEach(d => {
                const div = document.createElement('div');
                div.className = 'text-zinc-400 text-sm font-medium py-2';
                div.textContent = d;
                calendar.appendChild(div);
            });
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
                calendar.appendChild(document.createElement('div'));
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const div = document.createElement('div');
                div.className = 'py-3 rounded-2xl hover:bg-white/10 transition-all cursor-default text-lg';
                if (day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) {
                    div.className += ' bg-violet-600 text-white font-semibold';
                }
                div.textContent = day;
                calendar.appendChild(div);
            }
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }
        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // Запуск всего
        document.getElementById('city').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather(e.target.value);
        });
        
        getWeather();
        renderCalendar();
    </script>
</body>
</html>
