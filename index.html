<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #181818;
  --bg-card:    #1e1e1e;
  --bg-hover:   #242424;
  --border:     rgba(255,255,255,0.07);
  --border-act: rgba(255,255,255,0.14);
  --text:       #eeebe5;
  --text-2:     rgba(238,235,229,0.55);
  --text-3:     rgba(238,235,229,0.28);
  --accent:     #e07d4f;
  --accent-dim: rgba(224,125,79,0.12);
  --accent-mid: rgba(224,125,79,0.28);
  --gaming:     #7b9ef6;
  --tech:       #4fc3a1;
  --cinema:     #c97be8;
  --blur:       blur(20px);
  --r:          12px;
  --r-sm:       7px;
  --font:       'Segoe UI', system-ui, -apple-system, sans-serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* ═══════════════════════════════════════
   ТОПБАР
═══════════════════════════════════════ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; justify-content: center; padding: 10px 0;
  animation: slideDown 0.5s cubic-bezier(0.4,0,0.2,1) both;
}
.topbar-pill {
  display: flex; align-items: center; gap: 1px;
  background: rgba(24,24,24,0.92);
  border: 1px solid var(--border);
  border-radius: 13px; padding: 4px 6px;
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.5);
}
.tg { display: flex; align-items: center; }
.tg-sep { width: 1px; height: 18px; background: var(--border); margin: 0 5px; }
.tg-lbl {
  font-size: 8px; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text-3);
  padding: 0 4px 0 8px; white-space: nowrap;
}
.tl {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 8px;
  text-decoration: none; color: var(--text-2);
  font-size: 11.5px; font-weight: 500; letter-spacing: 0.01em;
  transition: color 0.1s, background 0.1s; white-space: nowrap;
}
.tl:hover { color: var(--text); background: rgba(255,255,255,0.07); }
.tl img { width: 13px; height: 13px; border-radius: 3px; opacity: 0.75; flex-shrink: 0; }

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
.layout {
  height: 100vh;
  display: grid;
  grid-template-columns: 248px 1fr 296px;
  grid-template-rows: 100%;
  padding: 58px 28px 28px;
  gap: 16px;
}

/* ═══════════════════════════════════════
   КАРТОЧКА
═══════════════════════════════════════ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
}
.clabel {
  font-size: 8px; font-weight: 800; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-3);
  margin-bottom: 12px; display: block;
}

/* ═══════════════════════════════════════
   ЛЕВАЯ КОЛОНКА
═══════════════════════════════════════ */
.col-left {
  display: flex; flex-direction: column; gap: 14px;
  animation: fadeUp 0.5s 0.05s cubic-bezier(0.4,0,0.2,1) both;
}

/* ЧАСЫ */
.clock-card {
  text-align: center; padding: 20px 16px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
}
.clock-time {
  font-size: 58px; font-weight: 800; letter-spacing: -0.05em;
  line-height: 1; font-variant-numeric: tabular-nums; color: var(--text);
}
.clock-colon { color: var(--accent); animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
.clock-divider {
  width: 28px; height: 1.5px; margin: 10px auto 9px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.clock-date { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-3); }
.clock-greet { font-size: 13px; font-weight: 500; color: var(--text-2); margin-top: 4px; }
.clock-greet .name { color: var(--accent); font-weight: 800; }

/* ПОГОДА */
.weather-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 15px; flex: 1; }
.w-search { display: flex; gap: 6px; margin-bottom: 12px; }
.w-inp {
  flex: 1; padding: 7px 10px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: var(--r-sm);
  color: var(--text); font: 12px/1 var(--font); font-weight: 500; outline: none;
  transition: border-color 0.13s;
}
.w-inp:focus { border-color: var(--accent-mid); }
.w-inp::placeholder { color: var(--text-3); font-weight: 400; }
.w-btn {
  padding: 7px 11px; background: var(--accent-dim);
  border: 1px solid var(--accent-mid); border-radius: var(--r-sm);
  color: var(--accent); font: 700 13px var(--font); cursor: pointer;
  transition: background 0.13s;
}
.w-btn:hover { background: rgba(224,125,79,0.22); }
.w-main { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 3px; }
.w-temp { font-size: 46px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; font-variant-numeric: tabular-nums; }
.w-icon { font-size: 28px; line-height: 1; padding-bottom: 3px; }
.w-desc { font-size: 11.5px; font-weight: 600; color: var(--text-2); margin-bottom: 2px; }
.w-loc { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 11px; }
.w-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
.w-row:last-child { border: none; }
.w-rl { font-size: 11px; font-weight: 500; color: var(--text-2); }
.w-rv { font-size: 11px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.w-msg { font-size: 12px; font-weight: 500; color: var(--text-3); }

/* ═══════════════════════════════════════
   ЦЕНТР — НОВОСТИ
═══════════════════════════════════════ */
.col-center {
  display: flex; flex-direction: column; gap: 0;
  animation: fadeUp 0.5s 0.08s cubic-bezier(0.4,0,0.2,1) both;
  min-height: 0;
}
.news-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
  display: flex; flex-direction: column; height: 100%;
  overflow: hidden;
}
.news-header {
  display: flex; align-items: center; gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 16px; flex-shrink: 0;
}
.news-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 13px 14px; font-size: 12px; font-weight: 700;
  color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s; white-space: nowrap;
  margin-bottom: -1px;
}
.news-tab:hover { color: var(--text-2); }
.news-tab.active { color: var(--text); }
.news-tab.active[data-cat="gaming"]  { border-color: var(--gaming); color: var(--gaming); }
.news-tab.active[data-cat="tech"]    { border-color: var(--tech);   color: var(--tech);   }
.news-tab.active[data-cat="cinema"]  { border-color: var(--cinema); color: var(--cinema); }
.news-tab-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.tab-gaming .news-tab-dot { background: var(--gaming); }
.tab-tech   .news-tab-dot { background: var(--tech);   }
.tab-cinema .news-tab-dot { background: var(--cinema); }

.news-refresh {
  margin-left: auto; background: none; border: none;
  color: var(--text-3); cursor: pointer; padding: 6px;
  border-radius: 6px; font-size: 14px; transition: color 0.12s, transform 0.3s;
}
.news-refresh:hover { color: var(--text-2); }
.news-refresh.spinning { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.news-body { flex: 1; overflow-y: auto; padding: 6px 0; }
.news-body::-webkit-scrollbar { width: 4px; }
.news-body::-webkit-scrollbar-track { background: transparent; }
.news-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.news-item {
  display: flex; gap: 13px; align-items: flex-start;
  padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
  text-decoration: none; transition: background 0.12s; cursor: pointer;
}
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: var(--bg-hover); }

.news-img {
  width: 72px; height: 48px; border-radius: 6px; object-fit: cover;
  background: rgba(255,255,255,0.05); flex-shrink: 0;
  border: 1px solid var(--border);
}
.news-img-placeholder {
  width: 72px; height: 48px; border-radius: 6px; flex-shrink: 0;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.news-content { flex: 1; min-width: 0; }
.news-source {
  font-size: 9px; font-weight: 800; letter-spacing: 0.12em;
  text-transform: uppercase; margin-bottom: 4px;
}
.news-source.gaming { color: var(--gaming); }
.news-source.tech   { color: var(--tech);   }
.news-source.cinema { color: var(--cinema); }

.news-title {
  font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 5px;
}
.news-meta { font-size: 10px; font-weight: 500; color: var(--text-3); }

.news-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 8px; color: var(--text-3);
}
.news-empty-icon { font-size: 32px; opacity: 0.4; }
.news-empty-text { font-size: 12px; font-weight: 500; }

.news-skeleton {
  padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex; gap: 13px;
}
.skel {
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite; border-radius: 5px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.skel-img { width: 72px; height: 48px; border-radius: 6px; flex-shrink: 0; }
.skel-lines { flex: 1; display: flex; flex-direction: column; gap: 7px; padding-top: 2px; }
.skel-line { height: 10px; }

/* ═══════════════════════════════════════
   ПРАВАЯ КОЛОНКА
═══════════════════════════════════════ */
.col-right {
  display: flex; flex-direction: column; gap: 14px;
  animation: fadeUp 0.5s 0.1s cubic-bezier(0.4,0,0.2,1) both;
  min-height: 0;
}

/* КАЛЕНДАРЬ */
.cal-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
  padding: 15px; flex-shrink: 0;
}
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-month { font-size: 13px; font-weight: 800; letter-spacing: 0.01em; }
.cal-nav {
  background: none; border: none; color: var(--text-3); cursor: pointer;
  font-size: 16px; padding: 3px 6px; border-radius: 6px;
  transition: color 0.12s, background 0.12s;
}
.cal-nav:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow {
  font-size: 8.5px; font-weight: 800; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-3); text-align: center; padding: 2px 0 7px;
}
.cal-day {
  font-size: 12px; font-weight: 500; text-align: center; padding: 5px 2px;
  border-radius: 6px; color: var(--text-3); font-variant-numeric: tabular-nums;
  position: relative; transition: background 0.1s, color 0.1s;
}
.cal-day.in  { color: var(--text); }
.cal-day.wkn.in { color: rgba(224,125,79,0.75); }
.cal-day.now { background: var(--accent); color: #fff !important; font-weight: 800; box-shadow: 0 2px 10px rgba(224,125,79,0.4); }
.cal-day.in:not(.now):hover { background: rgba(255,255,255,0.07); cursor: default; }
.ev-dot { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; }
.cal-day.now .ev-dot { background: rgba(255,255,255,0.7); }
.cal-day[data-ev]:hover::after {
  content: attr(data-ev);
  position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
  background: #111; border: 1px solid var(--border-act);
  color: var(--text); font-size: 10px; font-weight: 600;
  padding: 4px 9px; border-radius: 7px; white-space: nowrap;
  z-index: 200; pointer-events: none; backdrop-filter: blur(8px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
}

/* СОБЫТИЯ */
.ev-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
  padding: 15px; flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column;
}
.ev-list { display: flex; flex-direction: column; gap: 7px; overflow-y: auto; flex: 1; }
.ev-list::-webkit-scrollbar { width: 3px; }
.ev-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.ev-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--r-sm);
  background: rgba(255,255,255,0.025); border: 1px solid var(--border);
  transition: background 0.12s;
}
.ev-row:hover { background: rgba(255,255,255,0.05); }
.ev-color { width: 3px; height: 32px; border-radius: 2px; flex-shrink: 0; }
.ev-info { flex: 1; min-width: 0; }
.ev-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ev-date { font-size: 10px; font-weight: 500; color: var(--text-3); margin-top: 1px; }
.ev-countdown { font-size: 10px; font-weight: 800; white-space: nowrap; }
.ev-countdown.soon { color: var(--accent); }
.ev-countdown.far  { color: var(--text-3); }

@keyframes fadeUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- ТОПБАР -->
<div class="topbar">
  <div class="topbar-pill">
    <div class="tg">
      <span class="tg-lbl">Развлечения</span>
      <a class="tl" href="https://youtube.com"><img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=32" onerror="this.style.display='none'"> YouTube</a>

    </div>
    <div class="tg-sep"></div>
    <div class="tg">
      <span class="tg-lbl">Мессенджеры</span>
      <a class="tl" href="https://vk.com"><img src="https://www.google.com/s2/favicons?domain=vk.com&sz=32" onerror="this.style.display='none'"> VK</a>
      <a class="tl" href="https://web.telegram.org/a/"><img src="https://www.google.com/s2/favicons?domain=telegram.org&sz=32" onerror="this.style.display='none'"> Telegram</a>
      <a class="tl" href="https://mail.google.com"><img src="https://www.google.com/s2/favicons?domain=mail.google.com&sz=32" onerror="this.style.display='none'"> Gmail</a>

    <div class="tg-sep"></div>
    <div class="tg">
      <span class="tg-lbl">Нейросети</span>

      <a class="tl" href="https://grok.com"><img src="https://www.google.com/s2/favicons?domain=grok.com&sz=32" onerror="this.style.display='none'"> Grok</a>

  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- ЛЕВАЯ КОЛОНКА -->
  <div class="col-left">

    <!-- ЧАСЫ -->
    <div class="clock-card">
      <div class="clock-time">
        <span id="hh">00</span><span class="clock-colon">:</span><span id="mm">00</span><span class="clock-colon">:</span><span id="ss">00</span>
      </div>
      <div class="clock-divider"></div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-greet" id="clock-greet"></div>
    </div>

    <!-- ПОГОДА -->
    <div class="weather-card">
      <span class="clabel">Погода</span>
      <div class="w-search">
        <input class="w-inp" id="w-city" type="text" placeholder="Город..." autocomplete="off">
        <button class="w-btn" onclick="wFetchCity()">→</button>
      </div>
      <div id="w-content"><div class="w-msg">Введи город выше</div></div>
    </div>

  </div>

  <!-- ЦЕНТРАЛЬНАЯ КОЛОНКА — НОВОСТИ -->
  <div class="col-center">
    <div class="news-card">
      <div class="news-header">
        <div class="news-tab tab-gaming active" data-cat="gaming" onclick="newsSwitchTab('gaming')">
          <div class="news-tab-dot"></div> Игры
        </div>
        <div class="news-tab tab-tech" data-cat="tech" onclick="newsSwitchTab('tech')">
          <div class="news-tab-dot"></div> Технологии
        </div>
        <div class="news-tab tab-cinema" data-cat="cinema" onclick="newsSwitchTab('cinema')">
          <div class="news-tab-dot"></div> Кино и сериалы
        </div>
        <button class="news-refresh" id="news-refresh-btn" onclick="newsRefresh()" title="Обновить">↻</button>
      </div>
      <div class="news-body" id="news-body"></div>
    </div>
  </div>

  <!-- ПРАВАЯ КОЛОНКА -->
  <div class="col-right">

    <!-- КАЛЕНДАРЬ -->
    <div class="cal-card">
      <span class="clabel">Календарь</span>
      <div class="cal-head">
        <button class="cal-nav" onclick="calMove(-1)">‹</button>
        <div class="cal-month" id="cal-month"></div>
        <button class="cal-nav" onclick="calMove(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- СОБЫТИЯ -->
    <div class="ev-card">
      <span class="clabel">Ближайшие события</span>
      <div class="ev-list" id="ev-list"></div>
    </div>

  </div>

</div>

<script>
'use strict';

// ═══════════════════════════════════════
// ЧАСЫ
// ═══════════════════════════════════════
const DAYS = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MONS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONS_S = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const pad = n => String(n).padStart(2,'0');

function tick() {
  const n = new Date(), h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
  document.getElementById('hh').textContent = pad(h);
  document.getElementById('mm').textContent = pad(m);
  document.getElementById('ss').textContent = pad(s);
  document.getElementById('clock-date').textContent =
    DAYS[n.getDay()] + ', ' + n.getDate() + ' ' + MONS[n.getMonth()] + ' ' + n.getFullYear();
  const g = h<6?'Доброй ночи':h<12?'Доброе утро':h<18?'Добрый день':'Добрый вечер';
  document.getElementById('clock-greet').innerHTML = g + ', <span class="name">Goshke</span>';
}
tick(); setInterval(tick, 1000);

// ═══════════════════════════════════════
// СОБЫТИЯ КАЛЕНДАРЯ
// ═══════════════════════════════════════
const EVENTS = [
  { name:'День рождения 🎂',    m:4,  d:12, color:'#e07d4f', type:'birthday', repeat:true },
  { name:'Новый год 🎄',        m:1,  d:1,  color:'#7b9ef6', type:'holiday',  repeat:true },

function evForDate(y,m,d) {
  return EVENTS.filter(e => e.repeat ? e.m===m && e.d===d : e.y===y && e.m===m && e.d===d);
}

function evUpcoming() {
  const today = new Date(); today.setHours(0,0,0,0);
  const res = [];
  for (let i=0; i<=90; i++) {
    const dt = new Date(today); dt.setDate(today.getDate()+i);
    evForDate(dt.getFullYear(), dt.getMonth()+1, dt.getDate())
      .forEach(ev => res.push({ev, dt, days:i}));
  }
  return res.slice(0,6);
}

function renderEvents() {
  const list = document.getElementById('ev-list');
  const items = evUpcoming();
  if (!items.length) { list.innerHTML = '<div style="color:var(--text-3);font-size:12px;text-align:center;padding:20px">Нет событий</div>'; return; }
  const mns = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  list.innerHTML = items.map(({ev,dt,days}) => {
    const ds = dt.getDate()+' '+mns[dt.getMonth()];
    const cnt = days===0?'Сегодня!':days===1?'Завтра':'через '+days+' д.';
    const soon = days<=3;
    return `<div class="ev-row">
      <div class="ev-color" style="background:${ev.color}"></div>
      <div class="ev-info">
        <div class="ev-name">${ev.name}</div>
        <div class="ev-date">${ds}</div>
      </div>
      <div class="ev-countdown ${soon?'soon':'far'}">${cnt}</div>
    </div>`;
  }).join('');
}

let calDate = new Date();

function renderCal() {
  const today = new Date();
  const y = calDate.getFullYear(), mo = calDate.getMonth();
  document.getElementById('cal-month').textContent = MONS_S[mo]+' '+y;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => {
    const el = document.createElement('div');
    el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });
  const fd = (new Date(y,mo,1).getDay()+6)%7;
  for (let i=0;i<fd;i++) grid.appendChild(Object.assign(document.createElement('div'),{className:'cal-day'}));
  const last = new Date(y,mo+1,0).getDate();
  for (let d=1;d<=last;d++) {
    const el = document.createElement('div');
    el.className = 'cal-day in';
    el.textContent = d;
    const dow = (new Date(y,mo,d).getDay()+6)%7;
    if (dow>=5) el.classList.add('wkn');
    if (d===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear()) el.classList.add('now');
    const evs = evForDate(y,mo+1,d);
    if (evs.length) {
      const dot = document.createElement('div');
      dot.className='ev-dot'; dot.style.background=evs[0].color; el.appendChild(dot);
      el.setAttribute('data-ev', evs.map(e=>e.name).join(', '));
    }
    grid.appendChild(el);
  }
  renderEvents();
}
function calMove(dir) { calDate.setMonth(calDate.getMonth()+dir); renderCal(); }
renderCal();

async function wFetchCoords(lat,lon,city) {

  try {

const FEEDS = {
  gaming: [
    { url:'https://www.ign.com/rss/articles.xml',     source:'IGN',        cat:'gaming' },
    { url:'https://feeds.eurogamer.net/egfeed.rss',   source:'Eurogamer',  cat:'gaming' },
    { url:'https://www.pcgamer.com/rss/',              source:'PC Gamer',   cat:'gaming' },
    { url:'https://www.gamespot.com/feeds/news/',      source:'GameSpot',   cat:'gaming' },
  ],
  tech: [
    { url:'https://www.theverge.com/rss/index.xml',              source:'The Verge',   cat:'tech' },
    { url:'http://feeds.arstechnica.com/arstechnica/technology', source:'Ars Technica', cat:'tech' },
    { url:'https://techcrunch.com/feed/',                        source:'TechCrunch',  cat:'tech' },
    { url:'https://www.wired.com/feed/rss',                      source:'Wired',       cat:'tech' },
  ],
  cinema: [
    { url:'https://variety.com/feed/',                 source:'Variety',   cat:'cinema' },
    { url:'https://www.hollywoodreporter.com/feed/',   source:'THR',       cat:'cinema' },
    { url:'https://collider.com/feed/',                source:'Collider',  cat:'cinema' },
  ],
};

const PROXIES = [
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?url=',
];

const newsCache = {};
let curTab = 'gaming';

async function fetchRSS(url) {
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (res.ok) return await res.text();
    } catch {}
  }
  return null;
}

function parseRSS(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const items = [...doc.querySelectorAll('item')];
  return items.slice(0,8).map(item => {
    const get = tag => item.querySelector(tag)?.textContent?.trim() || '';
    const getAttr = (tag,attr) => item.querySelector(tag)?.getAttribute(attr) || '';
    // Картинка — пробуем разные места
    let img = getAttr('enclosure','url') || getAttr('media\\:content,media:content','url') ||
      getAttr('media\\:thumbnail,media:thumbnail','url') || '';
    if (!img) {
      const desc = get('description');
      const m = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (m) img = m[1];
    }
    const rawDate = get('pubDate') || get('published') || get('dc\\:date,dc:date') || '';
    return {
      title: get('title').replace(/<[^>]*>/g,''),
      link:  get('link') || getAttr('link','href'),
      img,
      date:  rawDate ? timeAgo(new Date(rawDate)) : '',
    };
  });
}

function timeAgo(date) {
  if (isNaN(date)) return '';
  const diff = Math.floor((Date.now() - date) / 60000);
  if (diff < 1) return 'только что';
  if (diff < 60) return diff + ' мин. назад';
  if (diff < 1440) return Math.floor(diff/60) + ' ч. назад';
  return Math.floor(diff/1440) + ' д. назад';
}

function newsShowSkeleton() {
  const body = document.getElementById('news-body');
  body.innerHTML = Array(6).fill(0).map(() => `
    <div class="news-skeleton">
      <div class="skel skel-img"></div>
      <div class="skel-lines">
        <div class="skel skel-line" style="width:55%"></div>
        <div class="skel skel-line" style="width:90%"></div>
        <div class="skel skel-line" style="width:75%"></div>
        <div class="skel skel-line" style="width:40%"></div>
      </div>
    </div>`).join('');
}

function newsRender(articles, cat) {
  const body = document.getElementById('news-body');
  if (!articles.length) {
    body.innerHTML = `<div class="news-empty"><div class="news-empty-icon">📡</div><div class="news-empty-text">Не удалось загрузить новости</div></div>`;
    return;
  }
  const emoji = cat==='gaming'?'🎮':cat==='tech'?'⚡':'🎬';
  body.innerHTML = articles.map(a => `
    <a class="news-item" href="${a.link}" target="_blank" rel="noopener">
      ${a.img
        ? `<img class="news-img" src="${a.img}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="news-img-placeholder">${emoji}</div>`}
      <div class="news-content">
        <div class="news-source ${cat}">${a.source}</div>
        <div class="news-title">${a.title}</div>
        <div class="news-meta">${a.date}</div>
      </div>
    </a>`).join('');
}

async function newsLoad(cat, force=false) {
  if (!force && newsCache[cat]) { newsRender(newsCache[cat], cat); return; }
  newsShowSkeleton();
  const btn = document.getElementById('news-refresh-btn');
  btn.classList.add('spinning');

  const all = [];
  await Promise.allSettled(FEEDS[cat].map(async feed => {
    try {
      const xml = await fetchRSS(feed.url);
      if (!xml) return;
      const items = parseRSS(xml);
      items.forEach(i => { i.source = feed.source; all.push(i); });
    } catch {}
  }));

  // Сортировать по свежести (items у которых есть date — выше)
  all.sort((a,b) => {
    const ta = a.date.includes('мин')?0:a.date.includes('ч.')?1:2;
    const tb = b.date.includes('мин')?0:b.date.includes('ч.')?1:2;
    return ta-tb;
  });

  newsCache[cat] = all.slice(0,20);
  btn.classList.remove('spinning');
  newsRender(newsCache[cat], cat);
}

function newsSwitchTab(cat) {
  curTab = cat;
  document.querySelectorAll('.news-tab').forEach(t => t.classList.toggle('active', t.dataset.cat===cat));
  newsLoad(cat);
}

function newsRefresh() { delete newsCache[curTab]; newsLoad(curTab, true); }

// Автообновление каждые 10 минут
setInterval(() => { delete newsCache[curTab]; newsLoad(curTab, true); }, 10*60*1000);

newsLoad('gaming');
