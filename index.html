<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #1a1a1a;
  --bg2:       #212121;
  --surface:   rgba(255,255,255,0.05);
  --border:    rgba(255,255,255,0.08);
  --text:      #f0ede8;
  --muted:     rgba(240,237,232,0.38);
  --accent:    #e8845a;
  --accent-lo: rgba(232,132,90,0.15);
  --accent-br: rgba(232,132,90,0.35);
  --blur:      blur(20px);
  --radius:    12px;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden;
}

/* Тонкая сетка */
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 52px 52px; pointer-events: none; z-index: 0;
}

/* Мягкое свечение по центру */
body::after {
  content: ''; position: fixed; top: -30%; left: 50%; transform: translateX(-50%);
  width: 800px; height: 500px;
  background: radial-gradient(ellipse, rgba(232,132,90,0.04) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* ═══════════════════════════════════════
   ВЕРХНЯЯ ПАНЕЛЬ ССЫЛОК
════════════════════════════════════════ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; justify-content: center; align-items: center;
  padding: 10px 0;
  animation: fadeDown 0.4s cubic-bezier(0.4,0,0.2,1) both;
}

.topbar-inner {
  display: flex; align-items: center; gap: 2px;
  background: rgba(26,26,26,0.7);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 5px 6px;
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
}

/* Группа ссылок */
.link-group {
  display: flex; align-items: center; gap: 1px;
}

.group-label {
  font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); padding: 0 6px 0 8px;
  opacity: 0.6; white-space: nowrap;
}

.top-link {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: 7px;
  text-decoration: none; color: var(--muted); font-size: 11.5px;
  font-weight: 500; letter-spacing: 0.01em;
  transition: color 0.12s ease, background 0.12s ease;
  white-space: nowrap;
}
.top-link:hover { color: var(--text); background: rgba(255,255,255,0.07); }
.top-link img { width: 13px; height: 13px; border-radius: 3px; opacity: 0.72; flex-shrink: 0; }

.topbar-sep {
  width: 1px; height: 16px; background: var(--border);
  margin: 0 4px; flex-shrink: 0;
}

/* ═══════════════════════════════════════
   ОСНОВНАЯ СЕТКА
════════════════════════════════════════ */
.dashboard {
  position: relative; z-index: 1; height: 100vh;
  display: grid;
  grid-template-columns: 252px 1fr 252px;
  grid-template-rows: 1fr 1fr;
  padding: 60px 36px 36px;
  gap: 0;
}

/* ═══════════════════════════════════════
   БАЗОВАЯ КАРТОЧКА
════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  padding: 15px;
}

.card-label {
  font-size: 8.5px; letter-spacing: 0.17em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 11px; font-weight: 600;
}

/* ═══════════════════════════════════════
   ЧАСЫ
════════════════════════════════════════ */
.clock-block {
  grid-column: 2; grid-row: 1 / 3;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding-bottom: 48px;
  animation: fadeUp 0.5s 0.04s cubic-bezier(0.4,0,0.2,1) both;
}

.clock {
  font-variant-numeric: tabular-nums;
  font-size: clamp(68px, 9vw, 116px);
  font-weight: 700;
  letter-spacing: -0.04em; line-height: 1;
  color: var(--text);
}
.clock::after {
  content: ''; display: block; margin: 10px auto 0; width: 32px; height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.colon { animation: blink 1s step-end infinite; color: var(--accent); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

.date-str {
  font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted); margin-top: 8px;
}
.greeting {
  font-size: 13px; font-weight: 500; color: var(--muted);
  margin-top: 3px; letter-spacing: 0.04em;
}

/* ═══════════════════════════════════════
   ЛЕВАЯ КОЛОНКА
════════════════════════════════════════ */
.left-col {
  grid-column: 1; grid-row: 1 / 3;
  display: flex; flex-direction: column; justify-content: center;
  gap: 12px;
  animation: fadeUp 0.5s 0.06s cubic-bezier(0.4,0,0.2,1) both;
}

/* ── Погода ── */
.weather-card { width: 222px; }

.w-city-input-wrap { display: flex; gap: 5px; margin-bottom: 10px; }
.w-city-input {
  flex: 1; padding: 6px 9px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-family: inherit; font-size: 12px;
  font-weight: 500; outline: none; transition: border-color 0.13s ease;
}
.w-city-input:focus { border-color: var(--accent-br); }
.w-city-input::placeholder { color: var(--muted); font-weight: 400; }
.w-city-btn {
  padding: 6px 10px; background: var(--accent-lo);
  border: 1px solid var(--accent-br); border-radius: 7px;
  color: var(--accent); font-family: inherit; font-size: 12px;
  font-weight: 600; cursor: pointer; transition: background 0.13s ease;
}
.w-city-btn:hover { background: rgba(232,132,90,0.25); }

.w-main { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 2px; }
.w-temp {
  font-size: 50px; font-weight: 700; letter-spacing: -0.03em;
  line-height: 1; font-variant-numeric: tabular-nums;
}
.w-icon { font-size: 32px; line-height: 1; padding-bottom: 4px; }
.w-desc { font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 3px; }
.w-city-name {
  font-size: 9px; font-weight: 600; letter-spacing: 0.13em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 12px; opacity: 0.55;
}
.w-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.w-row:last-child { border-bottom: none; }
.w-row-label { font-size: 11px; font-weight: 500; color: var(--muted); }
.w-row-val { font-size: 12px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.w-msg { font-size: 12px; font-weight: 500; color: var(--muted); line-height: 1.6; }

/* ── Плеер ── */
.player-card { width: 222px; }

.player-spotify-link {
  display: flex; align-items: center; gap: 6px; margin-bottom: 11px;
  text-decoration: none;
  padding: 6px 9px; border-radius: 7px;
  background: rgba(29,185,84,0.08); border: 1px solid rgba(29,185,84,0.18);
  transition: background 0.13s ease;
}
.player-spotify-link:hover { background: rgba(29,185,84,0.14); }
.player-spotify-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #1db954; flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
.player-spotify-text { font-size: 11px; font-weight: 600; color: rgba(29,185,84,0.85); letter-spacing: 0.03em; }

.player-track { margin-bottom: 11px; }
.player-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: 0.01em;
}
.player-artist { font-size: 11px; font-weight: 500; color: var(--muted); margin-top: 2px; }

.player-progress { margin-bottom: 9px; cursor: pointer; padding: 6px 0; }
.player-bar { height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; position: relative; }
.player-fill {
  height: 100%; width: 0%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), #f0a070);
  transition: width 0.6s linear; position: relative;
}
.player-fill::after {
  content: ''; position: absolute; right: -4px; top: -3px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); opacity: 0;
  transition: opacity 0.13s ease;
}
.player-progress:hover .player-fill::after { opacity: 1; }
.player-time {
  display: flex; justify-content: space-between;
  font-size: 9px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.05em; font-variant-numeric: tabular-nums; margin-top: 4px;
}

.player-controls {
  display: flex; align-items: center; justify-content: center; gap: 14px;
}
.player-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  padding: 4px; border-radius: 5px; display: flex; align-items: center;
  transition: color 0.12s ease, transform 0.12s ease;
}
.player-btn:hover { color: var(--text); transform: scale(1.12); }
.player-btn.play {
  width: 34px; height: 34px;
  background: rgba(255,255,255,0.07); border: 1px solid var(--border);
  border-radius: 50%; color: var(--text);
}
.player-btn.play:hover { background: rgba(255,255,255,0.12); transform: scale(1.06); }

/* ═══════════════════════════════════════
   ПРАВАЯ КОЛОНКА — КАЛЕНДАРЬ
════════════════════════════════════════ */
.right-col {
  grid-column: 3; grid-row: 1 / 3;
  display: flex; align-items: center; justify-content: flex-end;
  animation: fadeUp 0.5s 0.06s cubic-bezier(0.4,0,0.2,1) both;
}
.cal-card { width: 222px; }

.cal-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.cal-month-label { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
.cal-nav {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 16px; padding: 2px 5px; border-radius: 5px;
  transition: color 0.12s ease;
}
.cal-nav:hover { color: var(--text); }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow {
  font-size: 9px; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--muted); text-align: center; padding: 2px 0 6px;
}
.cal-day {
  font-size: 12px; font-weight: 500; text-align: center;
  padding: 5px 2px; border-radius: 5px; color: var(--muted);
  font-variant-numeric: tabular-nums;
  transition: background 0.12s ease, color 0.12s ease;
}
.cal-day.in-month { color: var(--text); }
.cal-day.weekend { color: rgba(232,132,90,0.7); }
.cal-day.today {
  background: var(--accent); color: #fff !important;
  font-weight: 700;
}
.cal-day.in-month:hover:not(.today) { background: rgba(255,255,255,0.06); cursor: default; }

/* ═══════════════════════════════════════
   АНИМАЦИИ
════════════════════════════════════════ */
@keyframes fadeUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- ── ОСНОВНАЯ СЕТКА ── -->
<div class="dashboard">

  <!-- ЛЕВАЯ КОЛОНКА -->
  <div class="left-col">

    <!-- Погода -->
    <div class="card weather-card">
      <div class="card-label">Погода</div>

          <svg id="pl-icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="player-btn" onclick="playerNext()" title="Вперёд">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6v12z"/></svg>

  <!-- ЧАСЫ -->

    <div class="clock">
      <span id="hh">00</span><span class="colon">:</span><span id="mm">00</span><span class="colon">:</span><span id="ss">00</span>
    </div>
    <div class="date-str" id="date-str"></div>

        <button class="cal-nav" onclick="calMove(-1)">‹</button>
        <div class="cal-month-label" id="cal-month"></div>

<script>
'use strict';

// ═══════════════════════════════════════
// ЧАСЫ
// ═══════════════════════════════════════
const DAYS         = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MONTHS       = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONTHS_SHORT = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const pad = n => String(n).padStart(2, '0');

function tick() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  document.getElementById('hh').textContent = pad(h);
  document.getElementById('mm').textContent = pad(m);
  document.getElementById('ss').textContent = pad(s);
  document.getElementById('date-str').textContent =
    DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('greeting').textContent =
    h < 6 ? 'Доброй ночи' : h < 12 ? 'Доброе утро' : h < 18 ? 'Добрый день' : 'Добрый вечер';
}
tick();
setInterval(tick, 1000);

// ═══════════════════════════════════════
// КАЛЕНДАРЬ
// ═══════════════════════════════════════
let calDate = new Date();

function renderCalendar() {
  const today = new Date();
  const y = calDate.getFullYear(), mo = calDate.getMonth();
  document.getElementById('cal-month').textContent = MONTHS_SHORT[mo] + ' ' + y;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  const firstDow = (new Date(y, mo, 1).getDay() + 6) % 7;
  for (let i = 0; i < firstDow; i++)
    grid.appendChild(Object.assign(document.createElement('div'), { className: 'cal-day' }));
  const daysInMonth = new Date(y, mo + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day in-month';
    el.textContent = d;
    const dow = (new Date(y, mo, d).getDay() + 6) % 7;
    if (dow >= 5) el.classList.add('weekend');
    if (d === today.getDate() && mo === today.getMonth() && y === today.getFullYear())
      el.classList.add('today');
    grid.appendChild(el);
  }
}

function calMove(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendar(); }
renderCalendar();

// ═══════════════════════════════════════
// ПОГОДА (Open-Meteo, без ключа)
// ═══════════════════════════════════════
const WMO_DESC = {
  0:'Ясно',1:'Преимущественно ясно',2:'Переменная облачность',3:'Пасмурно',
  45:'Туман',48:'Туман с изморозью',
  51:'Лёгкая морось',53:'Морось',55:'Густая морось',
  61:'Небольшой дождь',63:'Дождь',65:'Сильный дождь',
  71:'Небольшой снег',73:'Снег',75:'Сильный снег',77:'Снежные зёрна',
  80:'Небольшой ливень',81:'Ливень',82:'Сильный ливень',
  85:'Снегопад',86:'Сильный снегопад',
  95:'Гроза',96:'Гроза с градом',99:'Гроза с сильным градом'
};
const WMO_ICON = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌧️',55:'🌧️',61:'🌦️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'❄️',75:'❄️',77:'🌨️',
  80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',
  95:'⛈️',96:'⛈️',99:'⛈️'
};
const WIND_DIR = ['С','СВ','В','ЮВ','Ю','ЮЗ','З','СЗ'];
const windDir  = deg => WIND_DIR[Math.round(deg / 45) % 8];

function renderWeather(data, cityName) {
  const c = data.current, wc = c.weather_code;
  document.getElementById('weather-content').innerHTML = `
    <div class="w-main">
      <div class="w-temp">${Math.round(c.temperature_2m)}°</div>
      <div class="w-icon">${WMO_ICON[wc] || '🌡️'}</div>
    </div>
    <div class="w-desc">${WMO_DESC[wc] || '—'}</div>
    <div class="w-city-name">${cityName}</div>
    <div>
      <div class="w-row"><div class="w-row-label">🌡 Ощущается</div><div class="w-row-val">${Math.round(c.apparent_temperature)}°C</div></div>
      <div class="w-row"><div class="w-row-label">💧 Влажность</div><div class="w-row-val">${c.relative_humidity_2m}%</div></div>
      <div class="w-row"><div class="w-row-label">💨 Ветер</div><div class="w-row-val">${Math.round(c.wind_speed_10m)} км/ч ${windDir(c.wind_direction_10m)}</div></div>
      <div class="w-row"><div class="w-row-label">🌧 Осадки</div><div class="w-row-val">${c.precipitation} мм</div></div>
    </div>`;
}

async function fetchWeatherByCoords(lat, lon, cityName) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m`
      + `&wind_speed_unit=kmh&timezone=auto`;
    const data = await (await fetch(url)).json();
    renderWeather(data, cityName);
    localStorage.setItem('weather_city', cityName);
    localStorage.setItem('weather_lat',  lat);
    localStorage.setItem('weather_lon',  lon);
  } catch {
    document.getElementById('weather-content').innerHTML = '<div class="w-msg">Не удалось загрузить погоду</div>';
  }
}

async function fetchWeatherByCity() {
  const city = document.getElementById('city-input').value.trim();
  if (!city) return;
  document.getElementById('weather-content').innerHTML = '<div class="w-msg">Загружаю...</div>';
  try {
    const geo = await (await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ru`
    )).json();
    if (!geo.results?.length) {
      document.getElementById('weather-content').innerHTML = '<div class="w-msg">Город не найден</div>';
      return;
    }
    const r = geo.results[0];
    await fetchWeatherByCoords(r.latitude, r.longitude, r.name);
  } catch {
    document.getElementById('weather-content').innerHTML = '<div class="w-msg">Ошибка запроса</div>';
  }
}

document.getElementById('city-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchWeatherByCity();
});

// Восстановить сохранённый город
const savedCity = localStorage.getItem('weather_city');
const savedLat  = localStorage.getItem('weather_lat');
const savedLon  = localStorage.getItem('weather_lon');
if (savedCity && savedLat && savedLon) {
  document.getElementById('city-input').value = savedCity;
  fetchWeatherByCoords(savedLat, savedLon, savedCity);
}

// ═══════════════════════════════════════
// ПЛЕЕР (UI-демо с треклистом)
// ═══════════════════════════════════════
const tracks = [
  { title: 'OH I DID',        artist: 'Yeat',  dur: 204 },
  { title: 'Sorry Not Sorry', artist: 'Yeat',  dur: 187 },
  { title: 'Gët Busy',        artist: 'Yeat',  dur: 193 },
  { title: 'Monëy So Big',    artist: 'Yeat',  dur: 178 },
];

let plIdx = 0, plSec = 71, plPlaying = false, plTimer = null;
const plTime = s => Math.floor(s / 60) + ':' + pad(s % 60);

function plUpdateBar() {
  const pct = (plSec / tracks[plIdx].dur * 100).toFixed(1);
  document.getElementById('pl-fill').style.width = pct + '%';
  document.getElementById('pl-cur').textContent  = plTime(plSec);
}

function plRender() {
  const t = tracks[plIdx];
  document.getElementById('pl-title').textContent  = t.title;
  document.getElementById('pl-artist').textContent = t.artist;
  document.getElementById('pl-dur').textContent    = plTime(t.dur);
  plUpdateBar();
}

function playerToggle() {
  plPlaying = !plPlaying;
  document.getElementById('pl-icon-play').style.display  = plPlaying ? 'none' : '';
  document.getElementById('pl-icon-pause').style.display = plPlaying ? ''     : 'none';
  if (plPlaying) {
    plTimer = setInterval(() => {
      plSec++;
      if (plSec >= tracks[plIdx].dur) {
        plSec = 0; plIdx = (plIdx + 1) % tracks.length; plRender();
      } else {
        plUpdateBar();
      }
    }, 1000);
  } else {
    clearInterval(plTimer);
  }
}

function playerPrev() {
  plSec = 0;
  plIdx = (plIdx - 1 + tracks.length) % tracks.length;
  plRender();
}

function playerNext() {
  plSec = 0;
  plIdx = (plIdx + 1) % tracks.length;
  plRender();
}

function seekPlayer(e) {
  const rect  = document.getElementById('pl-progress').getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  plSec = Math.round(ratio * tracks[plIdx].dur);
  plUpdateBar();
}

plRender();
</script>
