<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0e0e0f;
  --surface: rgba(255,255,255,0.04);
  --border:  rgba(255,255,255,0.07);
  --text:    #e8e6e0;
  --muted:   rgba(232,230,224,0.35);
  --accent:  #7b6ef6;
  --accent2: #4fc3f7;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}

body::after {
  content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
  width: 700px; height: 400px;
  background: radial-gradient(ellipse, rgba(123,110,246,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.dashboard {
  position: relative; z-index: 1; height: 100vh;
  display: grid;
  grid-template-columns: 260px 1fr 260px;
  grid-template-rows: 1fr auto 1fr;
  padding: 36px; gap: 0;
}

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px); padding: 16px;
}

.card-label {
  font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}

/* РҹРһРҳРЎРҡ */
.search-block {
  grid-column: 2; grid-row: 1;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 40px;
  animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) both;
}

.search-wrap { position: relative; width: 360px; }

.search-input {
  width: 100%; padding: 11px 18px 11px 40px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: inherit; font-size: 13px; font-weight: 300;
  outline: none; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  transition: border-color 0.15s ease, background 0.15s ease;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: rgba(123,110,246,0.4); background: rgba(255,255,255,0.06); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); opacity: 0.28; pointer-events: none; }

/* Р§РҗРЎР« */
.clock-block {
  grid-column: 2; grid-row: 2;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  animation: fadeUp 0.55s 0.04s cubic-bezier(0.4,0,0.2,1) both;
}

.clock {
  font-variant-numeric: tabular-nums;
  font-size: clamp(64px, 8.5vw, 108px);
  font-weight: 200; letter-spacing: -0.04em; line-height: 1;
}
.clock::after {
  content: ''; display: block; margin: 9px auto 0; width: 34px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.colon { animation: blink 1s step-end infinite; color: var(--accent); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.12} }

.date-str { font-size: 11px; font-weight: 300; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.greeting  { font-size: 12px; color: var(--muted); margin-top: 1px; letter-spacing: 0.05em; }

/* РЎРЎР«РӣРҡРҳ */
.links-block {
  grid-column: 2; grid-row: 3;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 12px;
  animation: fadeUp 0.6s 0.08s cubic-bezier(0.4,0,0.2,1) both;
}
.links { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
.link-item {
  display: flex; align-items: center; gap: 7px; padding: 7px 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  text-decoration: none; color: var(--muted); font-size: 12px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease, transform 0.15s cubic-bezier(0.4,0,0.2,1);
}
.link-item:hover { color: var(--text); border-color: rgba(255,255,255,0.14); background: rgba(255,255,255,0.07); transform: translateY(-2px); }
.link-item img { width: 13px; height: 13px; border-radius: 2px; opacity: 0.65; }

/* РҹРһР“РһР”Рҗ */
.weather-block {
  grid-column: 1; grid-row: 1 / 4;
  display: flex; align-items: center; justify-content: flex-start;
  animation: fadeUp 0.6s 0.06s cubic-bezier(0.4,0,0.2,1) both;
}
.weather-card { width: 228px; }

.w-city-input-wrap { display: flex; gap: 6px; margin-bottom: 10px; }
.w-city-input {
  flex: 1; padding: 6px 10px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-family: inherit; font-size: 12px; outline: none;
  transition: border-color 0.15s ease;
}
.w-city-input:focus { border-color: rgba(123,110,246,0.4); }
.w-city-input::placeholder { color: var(--muted); }
.w-city-btn {
  padding: 6px 10px; background: rgba(123,110,246,0.15);
  border: 1px solid rgba(123,110,246,0.3); border-radius: 7px;
  color: var(--accent); font-family: inherit; font-size: 11px; cursor: pointer;
  transition: background 0.15s ease;
}
.w-city-btn:hover { background: rgba(123,110,246,0.25); }

.w-main { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 3px; }
.w-temp { font-size: 52px; font-weight: 200; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; }
.w-icon { font-size: 34px; line-height: 1; padding-bottom: 4px; }
.w-desc { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.w-city-name { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; opacity: 0.6; }

.w-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
.w-row:last-child { border-bottom: none; }
.w-row-label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.w-row-val { font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }
.w-msg { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* РҡРҗРӣР•РқР”РҗР Р¬ */
.calendar-block {
  grid-column: 3; grid-row: 1 / 4;
  display: flex; align-items: center; justify-content: flex-end;
  animation: fadeUp 0.6s 0.06s cubic-bezier(0.4,0,0.2,1) both;
}
.cal-card { width: 228px; }

.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-month-label { font-size: 13px; font-weight: 600; letter-spacing: 0.03em; }
.cal-nav { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; transition: color 0.12s ease; }
.cal-nav:hover { color: var(--text); }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: center; padding: 2px 0 6px; }
.cal-day { font-size: 12px; text-align: center; padding: 5px 2px; border-radius: 5px; color: var(--muted); font-variant-numeric: tabular-nums; }
.cal-day.in-month { color: var(--text); }
.cal-day.weekend { color: rgba(123,110,246,0.75); }
.cal-day.today { background: var(--accent); color: #fff !important; font-weight: 600; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="dashboard">

  <!-- РҹРһРҳРЎРҡ -->
  <div class="search-block">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="white" stroke-width="1.2"/>
        <path d="M10 10L14 14" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input class="search-input" id="search" type="text" placeholder="РҹРҫРёСҒРә РІ Google..." autocomplete="off">
    </div>
  </div>

  <!-- РҹРһР“РһР”Рҗ -->
  <div class="weather-block">
    <div class="card weather-card">
      <div class="card-label">РҹРҫРіРҫРҙР°</div>
      <div class="w-city-input-wrap">
        <input class="w-city-input" id="city-input" type="text" placeholder="Р’Р°СҲ РіРҫСҖРҫРҙ..." autocomplete="off">
        <button class="w-city-btn" onclick="fetchWeatherByCity()">вҶ’</button>
      </div>
      <div id="weather-content"><div class="w-msg">Р’РІРөРҙРё РіРҫСҖРҫРҙ РІСӢСҲРө</div></div>
    </div>
  </div>

  <!-- Р§РҗРЎР« -->
  <div class="clock-block">
    <div class="clock" id="clock">
      <span id="hh">00</span><span class="colon">:</span><span id="mm">00</span><span class="colon">:</span><span id="ss">00</span>
    </div>
    <div class="date-str" id="date-str"></div>
    <div class="greeting" id="greeting"></div>
  </div>

  <!-- РҡРҗРӣР•РқР”РҗР Р¬ -->
  <div class="calendar-block">
    <div class="card cal-card">
      <div class="card-label">РҡР°Р»РөРҪРҙР°СҖСҢ</div>
      <div class="cal-header">
        <button class="cal-nav" onclick="calMove(-1)">вҖ№</button>
        <div class="cal-month-label" id="cal-month"></div>
        <button class="cal-nav" onclick="calMove(1)">вҖә</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- РЎРЎР«РӣРҡРҳ -->
  <div class="links-block">
    <div class="links">
      <a class="link-item" href="https://youtube.com"><img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=32" onerror="this.style.display='none'"> YouTube</a>
      <a class="link-item" href="https://github.com"><img src="https://www.google.com/s2/favicons?domain=github.com&sz=32" onerror="this.style.display='none'"> GitHub</a>
      <a class="link-item" href="https://reddit.com"><img src="https://www.google.com/s2/favicons?domain=reddit.com&sz=32" onerror="this.style.display='none'"> Reddit</a>
      <a class="link-item" href="https://twitch.tv"><img src="https://www.google.com/s2/favicons?domain=twitch.tv&sz=32" onerror="this.style.display='none'"> Twitch</a>
      <a class="link-item" href="https://claude.ai"><img src="https://www.google.com/s2/favicons?domain=claude.ai&sz=32" onerror="this.style.display='none'"> Claude</a>
    </div>
  </div>

</div>
<script>
// === Р§РҗРЎР« ===
const DAYS   = ['Р’РҫСҒРәСҖРөСҒРөРҪСҢРө','РҹРҫРҪРөРҙРөР»СҢРҪРёРә','Р’СӮРҫСҖРҪРёРә','РЎСҖРөРҙР°','Р§РөСӮРІРөСҖРі','РҹСҸСӮРҪРёСҶР°','РЎСғРұРұРҫСӮР°'];
const MONTHS = ['СҸРҪРІР°СҖСҸ','С„РөРІСҖР°Р»СҸ','РјР°СҖСӮР°','Р°РҝСҖРөР»СҸ','РјР°СҸ','РёСҺРҪСҸ','РёСҺР»СҸ','Р°РІРіСғСҒСӮР°','СҒРөРҪСӮСҸРұСҖСҸ','РҫРәСӮСҸРұСҖСҸ','РҪРҫСҸРұСҖСҸ','РҙРөРәР°РұСҖСҸ'];
const MONTHS_SHORT = ['РҜРҪРІР°СҖСҢ','РӨРөРІСҖР°Р»СҢ','РңР°СҖСӮ','РҗРҝСҖРөР»СҢ','РңР°Р№','РҳСҺРҪСҢ','РҳСҺР»СҢ','РҗРІРіСғСҒСӮ','РЎРөРҪСӮСҸРұСҖСҢ','РһРәСӮСҸРұСҖСҢ','РқРҫСҸРұСҖСҢ','Р”РөРәР°РұСҖСҢ'];
const pad = n => String(n).padStart(2, '0');

function tick() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  document.getElementById('hh').textContent = pad(h);
  document.getElementById('mm').textContent = pad(m);
  document.getElementById('ss').textContent = pad(s);
  document.getElementById('date-str').textContent =
    DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('greeting').textContent =
    h < 6 ? 'Р”РҫРұСҖРҫР№ РҪРҫСҮРё' : h < 12 ? 'Р”РҫРұСҖРҫРө СғСӮСҖРҫ' : h < 18 ? 'Р”РҫРұСҖСӢР№ РҙРөРҪСҢ' : 'Р”РҫРұСҖСӢР№ РІРөСҮРөСҖ';
}
tick();
setInterval(tick, 1000);

// === РҹРһРҳРЎРҡ ===
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.value.trim())
    window.location = 'https://google.com/search?q=' + encodeURIComponent(e.target.value.trim());
});
document.addEventListener('keydown', e => {
  const inp = document.getElementById('search');
  const cityInp = document.getElementById('city-input');
  if (document.activeElement !== inp && document.activeElement !== cityInp
      && e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    inp.focus();
  }
});

// === РҡРҗРӣР•РқР”РҗР Р¬ ===
let calDate = new Date();
function renderCalendar() {
  const today = new Date();
  const y = calDate.getFullYear(), mo = calDate.getMonth();
  document.getElementById('cal-month').textContent = MONTHS_SHORT[mo] + ' ' + y;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['РҹРҪ','Р’СӮ','РЎСҖ','Р§СӮ','РҹСӮ','РЎРұ','Р’СҒ'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  const firstDow = (new Date(y, mo, 1).getDay() + 6) % 7;
  for (let i = 0; i < firstDow; i++) {
    grid.appendChild(Object.assign(document.createElement('div'), {className:'cal-day'}));
  }
  const last = new Date(y, mo + 1, 0).getDate();
  for (let d = 1; d <= last; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day in-month';
    el.textContent = d;
    const dow = (new Date(y, mo, d).getDay() + 6) % 7;
    if (dow >= 5) el.classList.add('weekend');
    if (d === today.getDate() && mo === today.getMonth() && y === today.getFullYear())
      el.classList.add('today');
    grid.appendChild(el);
  }
}
function calMove(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendar(); }
renderCalendar();

// === РҹРһР“РһР”Рҗ ===
const WMO_DESC = {
  0:'РҜСҒРҪРҫ', 1:'РҹСҖРөРёРјСғСүРөСҒСӮРІРөРҪРҪРҫ СҸСҒРҪРҫ', 2:'РҹРөСҖРөРјРөРҪРҪР°СҸ РҫРұР»Р°СҮРҪРҫСҒСӮСҢ', 3:'РҹР°СҒРјСғСҖРҪРҫ',
  45:'РўСғРјР°РҪ', 48:'РўСғРјР°РҪ СҒ РёР·РјРҫСҖРҫР·СҢСҺ',
  51:'РӣС‘РіРәР°СҸ РјРҫСҖРҫСҒСҢ', 53:'РңРҫСҖРҫСҒСҢ', 55:'Р“СғСҒСӮР°СҸ РјРҫСҖРҫСҒСҢ',
  61:'РқРөРұРҫР»СҢСҲРҫР№ РҙРҫР¶РҙСҢ', 63:'Р”РҫР¶РҙСҢ', 65:'РЎРёР»СҢРҪСӢР№ РҙРҫР¶РҙСҢ',
  71:'РқРөРұРҫР»СҢСҲРҫР№ СҒРҪРөРі', 73:'РЎРҪРөРі', 75:'РЎРёР»СҢРҪСӢР№ СҒРҪРөРі', 77:'РЎРҪРөР¶РҪСӢРө Р·С‘СҖРҪР°',
  80:'РқРөРұРҫР»СҢСҲРҫР№ Р»РёРІРөРҪСҢ', 81:'РӣРёРІРөРҪСҢ', 82:'РЎРёР»СҢРҪСӢР№ Р»РёРІРөРҪСҢ',
  85:'РЎРҪРөРіРҫРҝР°Рҙ', 86:'РЎРёР»СҢРҪСӢР№ СҒРҪРөРіРҫРҝР°Рҙ',
  95:'Р“СҖРҫР·Р°', 96:'Р“СҖРҫР·Р° СҒ РіСҖР°РҙРҫРј', 99:'Р“СҖРҫР·Р° СҒ РәСҖСғРҝРҪСӢРј РіСҖР°РҙРҫРј'
};
const WMO_ICON = {
  0:'вҳҖпёҸ', 1:'рҹҢӨпёҸ', 2:'вӣ…', 3:'вҳҒпёҸ', 45:'рҹҢ«пёҸ', 48:'рҹҢ«пёҸ',
  51:'рҹҢҰпёҸ', 53:'рҹҢ§пёҸ', 55:'рҹҢ§пёҸ', 61:'рҹҢҰпёҸ', 63:'рҹҢ§пёҸ', 65:'рҹҢ§пёҸ',
  71:'рҹҢЁпёҸ', 73:'вқ„пёҸ', 75:'вқ„пёҸ', 77:'рҹҢЁпёҸ',
  80:'рҹҢҰпёҸ', 81:'рҹҢ§пёҸ', 82:'вӣҲпёҸ', 85:'рҹҢЁпёҸ', 86:'вқ„пёҸ',
  95:'вӣҲпёҸ', 96:'вӣҲпёҸ', 99:'вӣҲпёҸ'
};
const WIND_DIR = ['РЎ','РЎР’','Р’','Р®Р’','Р®','Р®Р—','Р—','РЎР—'];
const windDir = deg => WIND_DIR[Math.round(deg / 45) % 8];

function renderWeather(data, cityName) {
  const c = data.current;
  const wc = c.weather_code;
  document.getElementById('weather-content').innerHTML = `
    <div class="w-main">
      <div class="w-temp">${Math.round(c.temperature_2m)}В°</div>
      <div class="w-icon">${WMO_ICON[wc] || 'рҹҢЎпёҸ'}</div>
    </div>
    <div class="w-desc">${WMO_DESC[wc] || 'вҖ”'}</div>
    <div class="w-city-name">${cityName}</div>
    <div>
      <div class="w-row">
        <div class="w-row-label">рҹҢЎ РһСүСғСүР°РөСӮСҒСҸ</div>
        <div class="w-row-val">${Math.round(c.apparent_temperature)}В°C</div>
      </div>
      <div class="w-row">
        <div class="w-row-label">рҹ’§ Р’Р»Р°Р¶РҪРҫСҒСӮСҢ</div>
        <div class="w-row-val">${c.relative_humidity_2m}%</div>
      </div>
      <div class="w-row">
        <div class="w-row-label">рҹ’Ё Р’РөСӮРөСҖ</div>
        <div class="w-row-val">${Math.round(c.wind_speed_10m)} РәРј/СҮ ${windDir(c.wind_direction_10m)}</div>
      </div>
      <div class="w-row">
        <div class="w-row-label">рҹҢ§ РһСҒР°РҙРәРё</div>
        <div class="w-row-val">${c.precipitation} РјРј</div>
      </div>
    </div>`;
}

async function fetchWeatherByCoords(lat, lon, cityName) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m`
      + `&wind_speed_unit=kmh&timezone=auto`;
    const res = await fetch(url);
    const data = await res.json();
    renderWeather(data, cityName);
    localStorage.setItem('weather_city', cityName);
    localStorage.setItem('weather_lat', lat);
    localStorage.setItem('weather_lon', lon);
  } catch(e) {
    document.getElementById('weather-content').innerHTML = '<div class="w-msg">РқРө СғРҙР°Р»РҫСҒСҢ Р·Р°РіСҖСғР·РёСӮСҢ РҝРҫРіРҫРҙСғ</div>';
  }
}

async function fetchWeatherByCity() {
  const city = document.getElementById('city-input').value.trim();
  if (!city) return;
  document.getElementById('weather-content').innerHTML = '<div class="w-msg">Р—Р°РіСҖСғР¶Р°СҺ...</div>';
  try {
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ru`);
    const geoData = await geo.json();
    if (!geoData.results || !geoData.results.length) {
      document.getElementById('weather-content').innerHTML = '<div class="w-msg">Р“РҫСҖРҫРҙ РҪРө РҪР°Р№РҙРөРҪ</div>';
      return;
    }
    const r = geoData.results[0];
    await fetchWeatherByCoords(r.latitude, r.longitude, r.name);
  } catch(e) {
    document.getElementById('weather-content').innerHTML = '<div class="w-msg">РһСҲРёРұРәР° Р·Р°РҝСҖРҫСҒР°</div>';
  }
}

document.getElementById('city-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchWeatherByCity();
});

// Р—Р°РіСҖСғР·РёСӮСҢ СҒРҫС…СҖР°РҪС‘РҪРҪСӢР№ РіРҫСҖРҫРҙ РҝСҖРё СҒСӮР°СҖСӮРө
const savedCity = localStorage.getItem('weather_city');
const savedLat  = localStorage.getItem('weather_lat');
const savedLon  = localStorage.getItem('weather_lon');
if (savedCity && savedLat && savedLon) {
  document.getElementById('city-input').value = savedCity;
  fetchWeatherByCoords(savedLat, savedLon, savedCity);
}
</script>
